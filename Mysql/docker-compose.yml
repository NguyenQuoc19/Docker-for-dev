services:
  mysql:
    image: arm64v8/mysql:8.4
    container_name: mysql_db
    environment:
      MYSQL_DATABASE: test
      MYSQL_USER: user
      MYSQL_PASSWORD: user@123
      MYSQL_ROOT_USER: root
      MYSQL_ROOT_PASSWORD: root@123
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
      UPLOAD_LIMIT: 64M
      MEMORY_LIMIT: 256M
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

volumes:
  mysql_data:
    name: mysql_data

networks:
  app-network:
    driver: bridge
