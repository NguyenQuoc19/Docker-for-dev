# Config http server
server {
  listen 80;
  listen [::]:80;
  server_name admin.local.site api.local.site;
  return 301 https://$host$request_uri;
}

# Server React frontend
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name admin.local.site;

  ssl_certificate /etc/ssl/self-signed/cert.pem;
  ssl_certificate_key /etc/ssl/self-signed/key.pem;

  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log;

  location / {
    root /usr/share/nginx/html;
    index index.html index.htm;
    try_files $uri $uri/ /index.html;
  }

  error_page 500 502 503 504 /50x.html;
  location = /50x.html {
    root /usr/share/nginx/html;
  }
}

# Server NodeJS backend
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name api.local.site;

  ssl_certificate /etc/ssl/self-signed/cert.pem;
  ssl_certificate_key /etc/ssl/self-signed/key.pem;

  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log;

  location / {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 60s;
  }

  error_page 500 502 503 504 /50x.html;
  location = /50x.html {
    root /usr/share/nginx/html;
  }
}